# Fluxo — Example Configuration
#
# This file demonstrates Fluxo's TOML configuration format.
# Copy it to ./fluxo.toml and customize for your setup.
#
# For full documentation, see: https://github.com/fluxo-dev/fluxo

# ─── Global Settings ────────────────────────────────────────────────

[global]
admin = "127.0.0.1:2019"      # Admin API address (/health, /metrics, /config)
threads = 0                    # Worker threads (0 = auto-detect CPU count)
log_level = "info"             # trace | debug | info | warn | error
access_log_format = "json"     # "json" (machine-readable) or "compact" (human-readable)
metrics_enabled = true         # Expose Prometheus metrics at /metrics
# cert_dir = "/var/fluxo/certs"  # ACME certificate storage directory

# ─── Global Plugins (apply to all routes) ─────────────────────────
[global.plugins.security_headers]
hsts_max_age = 31536000
x_content_type_options = true
x_frame_options = "DENY"

[global.plugins.request_id]
header = "X-Request-ID"

# ─── Services ───────────────────────────────────────────────────────
# A service groups listeners (addresses to bind) with routes (traffic rules).

[services.web]

  # Listeners — where Fluxo accepts connections.
  [[services.web.listeners]]
  address = "0.0.0.0:80"

  [[services.web.listeners]]
  address = "0.0.0.0:443"
  offer_h2 = true

  # ─── TLS: Automatic HTTPS (ACME / Let's Encrypt) ─────────────────
  # Fluxo automatically obtains and renews TLS certificates.
  # Domains are collected from match_host patterns in routes below.
  # HTTP requests on port 80 are redirected to HTTPS automatically.
  [services.web.tls]
  acme = true
  acme_email = "ops@example.com"
  # acme_staging = true           # Use LE staging for testing
  # acme_directory = "https://..."  # Custom ACME directory URL

  # ─── TLS: Manual certificates (alternative to ACME) ──────────────
  # Uncomment these instead of acme = true for manual cert management:
  # [services.web.tls]
  # cert_path = "/etc/fluxo/cert.pem"
  # key_path = "/etc/fluxo/key.pem"

  # ─── Routes ───────────────────────────────────────────────────────
  # Evaluated in order, first match wins.
  # Empty match fields = catch-all (matches everything).

  [[services.web.routes]]
  name = "api"
  match_host = ["api.example.com"]
  match_path = ["/v1/*"]
  upstream = "api-servers"

  [services.web.routes.plugins.rate_limit]
  requests_per_second = 100
  burst = 50

  [services.web.routes.plugins.cors]
  allowed_origins = ["https://app.example.com"]
  allowed_methods = ["GET", "POST", "PUT", "DELETE"]
  allowed_headers = ["Content-Type", "Authorization"]
  max_age = 3600

  [services.web.routes.plugins.headers]
  response_set = { "X-Powered-By" = "fluxo" }
  response_remove = ["Server"]

  # Header matching: exact values or regex (prefix with ~)
  [[services.web.routes]]
  name = "debug"
  match_header = { "X-Debug" = "true" }
  upstream = "api-servers"

  # Regex header matching example:
  # match_header = { "X-Version" = "~^v[0-9]+" }

  [[services.web.routes]]
  name = "static"
  match_host = ["example.com", "www.example.com"]
  upstream = "web-servers"

  [[services.web.routes]]
  name = "catch-all"
  upstream = "web-servers"

# ─── Upstreams ──────────────────────────────────────────────────────
# Named groups of backend servers.

[upstreams.api-servers]
discovery = "static"
targets = ["10.0.1.1:8080", "10.0.1.2:8080", "10.0.1.3:8080"]
load_balancing = "round_robin"    # round_robin | random | fnv_hash | consistent_hash

[upstreams.api-servers.health_check]
path = "/healthz"
interval = "10s"
timeout = "3s"
unhealthy_threshold = 3
healthy_threshold = 2

[upstreams.web-servers]
discovery = "static"
targets = ["10.0.2.1:3000", "10.0.2.2:3000"]
load_balancing = "round_robin"
