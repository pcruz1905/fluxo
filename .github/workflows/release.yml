name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }}, ${{ matrix.tls }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            tls: boringssl
            suffix: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            tls: rustls
            suffix: "-rustls"

          # Linux aarch64 (cross-compile)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            tls: rustls
            suffix: "-rustls"

          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            tls: rustls
            suffix: "-rustls"

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            tls: rustls
            suffix: "-rustls"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ matrix.tls }}

      # Linux build deps
      - name: Install BoringSSL build deps
        if: matrix.tls == 'boringssl' && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y cmake nasm

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      # Build
      - name: Build (boringssl)
        if: matrix.tls == 'boringssl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (rustls)
        if: matrix.tls == 'rustls'
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features rustls

      # Package
      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          BINARY=fluxo
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            BINARY=fluxo.exe
          fi

          ARCH=$(echo "${{ matrix.target }}" | cut -d- -f1)
          OS=$(echo "${{ matrix.target }}" | cut -d- -f3)
          ARCHIVE=fluxo-${ARCH}-${OS}${{ matrix.suffix }}.tar.gz

          tar czf "../../../${ARCHIVE}" "${BINARY}"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}

  release:
    name: create release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: artifacts/*
          generate_release_notes: false
