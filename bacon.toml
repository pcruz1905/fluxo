# bacon.toml — https://dystroy.org/bacon/

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.check-all]
command = ["cargo", "check", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = [
    "cargo", "clippy",
    "--all-targets",
    "--color", "always",
]
need_stdout = false

[jobs.test]
command = [
    "cargo", "test",
    "--color", "always",
    "--", "--color", "always",
]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--no-deps", "--color", "always"]
need_stdout = false

[jobs.doc-open]
command = ["cargo", "doc", "--no-deps", "--open", "--color", "always"]
need_stdout = false
on_success = "back"

[jobs.run]
command = [
    "cargo", "run",
    "--color", "always",
    "--",
    "--test",
]
need_stdout = true
allow_warnings = true
on_success = "back"

[keybindings]
c = "job:clippy"
t = "job:test"
d = "job:doc-open"
r = "job:run"

# Default job when running `bacon` with no arguments
[default]
job = "clippy"
